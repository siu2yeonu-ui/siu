<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="영어, 한글, 한문, 인기 스타일의 게임 닉네임을 랜덤으로 추천해주는 무료 닉네임 생성기입니다." />
  <meta name="keywords" content="닉네임 생성기, 게임 닉네임, 영어 닉네임, 한글 닉네임, 한문 닉네임, 인기 닉네임" />
  <meta property="og:title" content="닉네임 생성기" />
  <meta property="og:description" content="영어·한글·한문·인기 스타일 닉네임을 랜덤으로 추천합니다." />
  <meta property="og:type" content="website" />
  <title>닉네임 생성기 - 게임 닉네임 추천</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --cyan: #00e0ff;
      --mint: #00ffa3;
      --pink: #ff00cc;
      --bg-dark: #07111a;
      --text-soft: rgba(255, 255, 255, 0.76);
      --glass: rgba(255, 255, 255, 0.12);
      --glass-light: rgba(255, 255, 255, 0.18);
    }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, "Malgun Gothic", sans-serif;
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 15%, rgba(0, 224, 255, 0.28), transparent 28%),
        radial-gradient(circle at 80% 80%, rgba(255, 0, 204, 0.22), transparent 30%),
        radial-gradient(circle at 50% 40%, rgba(0, 255, 163, 0.08), transparent 36%),
        linear-gradient(135deg, #07111a, #102c3a, #1f4b5d);
      color: white;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.42) 1px, transparent 1.5px),
        radial-gradient(circle, rgba(0,224,255,0.28) 1px, transparent 1.5px);
      background-size: 42px 42px, 76px 76px;
      animation: starMove 18s linear infinite;
      opacity: 0.35;
    }

    body::after {
      content: "";
      position: fixed;
      width: 520px;
      height: 520px;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      background: conic-gradient(from 180deg, transparent, rgba(0,224,255,0.16), rgba(255,0,204,0.14), transparent);
      filter: blur(35px);
      opacity: 0.65;
      pointer-events: none;
      animation: auraSpin 10s linear infinite;
    }

    @keyframes starMove {
      from { background-position: 0 0, 0 0; }
      to { background-position: 220px 360px, -180px 260px; }
    }

    @keyframes auraSpin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .skip-link {
      position: absolute;
      left: -999px;
      top: 8px;
      padding: 10px 14px;
      background: #fff;
      color: #111827;
      border-radius: 10px;
      z-index: 99;
    }

    .skip-link:focus {
      left: 8px;
    }

    header {
      position: relative;
      z-index: 1;
      padding: 34px 16px 12px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: clamp(28px, 6vw, 42px);
      letter-spacing: 2px;
      text-shadow: 0 0 18px rgba(0,224,255,0.55), 0 0 28px rgba(255,0,204,0.3);
    }

    header p {
      margin: 10px auto 0;
      max-width: 620px;
      color: var(--text-soft);
      font-size: 15px;
      line-height: 1.6;
    }

    main {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      padding: 24px 14px 40px;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 760px;
      background: linear-gradient(180deg, rgba(255,255,255,0.13), rgba(255,255,255,0.06));
      padding: 30px;
      border-radius: 30px;
      backdrop-filter: blur(22px);
      box-shadow:
        0 18px 60px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(255,255,255,0.18);
      border: 1px solid rgba(255, 255, 255, 0.16);
      overflow: hidden;
      animation: cardIn 0.7s ease-out both;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 30px;
      padding: 2px;
      background: linear-gradient(120deg, transparent, rgba(0,224,255,0.8), rgba(255,0,204,0.75), transparent);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: borderGlow 4s linear infinite;
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      right: -80px;
      top: -90px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,224,255,0.25), transparent 65%);
      pointer-events: none;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes borderGlow {
      0% { filter: hue-rotate(0deg); opacity: 0.75; }
      50% { opacity: 1; }
      100% { filter: hue-rotate(360deg); opacity: 0.75; }
    }

    .control-area,
    .button-row,
    .history-title,
    .history,
    .tip-box,
    .ad-box,
    .site-guide {
      position: relative;
      z-index: 1;
    }

    .control-area {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    label {
      display: block;
      text-align: left;
      margin: 0 0 7px;
      color: #e5e7eb;
      font-size: 14px;
      font-weight: bold;
    }

    select {
      width: 100%;
      padding: 15px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.35);
      font-size: 16px;
      color: #111827;
      outline: none;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 8px 22px rgba(0,0,0,0.16);
      cursor: pointer;
    }

    select:focus {
      box-shadow: 0 0 0 3px rgba(0,224,255,0.25), 0 8px 22px rgba(0,0,0,0.18);
    }

    .result-box {
      position: relative;
      margin: 28px 0 20px;
      padding: 34px 14px;
      min-height: 180px;
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.26), rgba(0,0,0,0.15)),
        radial-gradient(circle at 50% 0%, rgba(0,224,255,0.24), transparent 52%);
      border: 1px solid rgba(255, 255, 255, 0.14);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: inset 0 0 40px rgba(0,224,255,0.08);
      z-index: 1;
    }

    .result-box::before {
      content: "";
      position: absolute;
      width: 120%;
      height: 80px;
      top: -80px;
      left: -10%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
      transform: rotate(-8deg);
      animation: shine 3.5s ease-in-out infinite;
    }

    @keyframes shine {
      0%, 35% { top: -90px; opacity: 0; }
      50% { opacity: 0.85; }
      75%, 100% { top: 220px; opacity: 0; }
    }

    #nickname {
      position: relative;
      font-size: clamp(38px, 8vw, 58px);
      line-height: 1.15;
      text-align: center;
      font-weight: 900;
      background: linear-gradient(90deg, var(--cyan), var(--mint), var(--pink));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 12px rgba(0,224,255,0.35));
      word-break: break-all;
      min-height: 62px;
      animation: nickPulse 2.4s ease-in-out infinite;
    }

    @keyframes nickPulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 11px rgba(0,224,255,0.35)); }
      50% { transform: scale(1.025); filter: drop-shadow(0 0 20px rgba(255,0,204,0.35)); }
    }

    #meaning {
      text-align: center;
      color: #d1d5db;
      margin-top: 14px;
      min-height: 22px;
      font-size: 15px;
      line-height: 1.5;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      position: relative;
      overflow: hidden;
      width: 100%;
      padding: 18px;
      font-size: 18px;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      font-weight: 900;
      transition: transform 0.18s, filter 0.18s, box-shadow 0.18s;
      touch-action: manipulation;
    }

    button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -80%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
      transform: skewX(-18deg);
      transition: 0.45s;
    }

    button:hover::before { left: 125%; }
    button:hover { transform: translateY(-2px) scale(1.01); filter: brightness(1.08); }
    button:active { transform: scale(0.98); }
    button:focus-visible, select:focus-visible {
      outline: 3px solid rgba(0, 255, 163, 0.7);
      outline-offset: 3px;
    }

    .generate {
      background: linear-gradient(90deg, #00e0ff, #00ffa3);
      color: #07151f;
      box-shadow: 0 10px 24px rgba(0,224,255,0.24);
    }

    .copy {
      background: linear-gradient(90deg, #ff0077, #ff4d4d);
      color: white;
      box-shadow: 0 10px 24px rgba(255,0,119,0.22);
    }

    .history-title {
      margin: 24px 0 10px;
      font-size: 14px;
      font-weight: bold;
      color: rgba(255, 255, 255, 0.8);
      text-align: center;
    }

    .history {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      justify-content: center;
      min-height: 40px;
    }

    .history-item {
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      cursor: pointer;
      font-size: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      transition: 0.18s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .history-item:hover {
      background: rgba(0, 224, 255, 0.22);
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(0,224,255,0.18);
    }

    .tip-box,
    .site-guide {
      margin-top: 24px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      text-align: center;
      color: rgba(255, 255, 255, 0.78);
      font-size: 14px;
      line-height: 1.65;
      border: 1px solid rgba(255,255,255,0.09);
    }

    .site-guide {
      text-align: left;
    }

    .site-guide h2 {
      margin: 0 0 8px;
      font-size: 18px;
      color: white;
    }

    .site-guide p {
      margin: 0;
    }

    .ad-box {
      margin-top: 20px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      text-align: center;
      color: rgba(255, 255, 255, 0.55);
      border: 1px dashed rgba(255, 255, 255, 0.24);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.78);
      color: white;
      opacity: 0;
      pointer-events: none;
      transition: 0.25s;
      font-size: 14px;
      z-index: 10;
      box-shadow: 0 10px 28px rgba(0,0,0,0.35);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 560px) {
      header { padding-top: 26px; }
      .card { padding: 20px; border-radius: 24px; }
      .button-row { grid-template-columns: 1fr; }
      button { padding: 16px; }
      .result-box { min-height: 160px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">본문 바로가기</a>

  <header>
    <h1>🔥 닉네임 생성기</h1>
    <p>영어, 한글, 한문, 인기 스타일 중 원하는 유형을 골라 게임과 SNS에 어울리는 닉네임을 빠르게 추천받아보세요.</p>
  </header>

  <main id="main">
    <section class="card" aria-label="닉네임 생성기">
      <div class="control-area">
        <div>
          <label for="type">닉네임 유형 선택</label>
          <select id="type" aria-label="닉네임 유형 선택">
            <option value="random">랜덤</option>
            <option value="popular">인기</option>
            <option value="en">영어</option>
            <option value="kr">한글</option>
            <option value="hanja">한문</option>
          </select>
        </div>
      </div>

      <div class="result-box" aria-live="polite">
        <div id="nickname"></div>
        <div id="meaning"></div>
      </div>

      <div class="button-row">
        <button type="button" class="generate" id="generateBtn">✨ 생성하기</button>
        <button type="button" class="copy" id="copyBtn">📋 복사</button>
      </div>

      <div class="history-title">최근 생성한 닉네임</div>
      <div id="history" class="history" aria-label="최근 생성한 닉네임"></div>

      <div class="tip-box">
        Enter 키를 누르면 새 닉네임이 생성됩니다.<br />
        최근 닉네임을 클릭하면 다시 선택할 수 있습니다.
      </div>

      <section class="site-guide">
        <h2>닉네임 추천 기준</h2>
        <p>영어는 세련된 게임 느낌, 한글은 개성 있는 한국식 표현, 한문은 짧고 강한 분위기, 인기는 멋진 감성과 영·한 혼합 스타일 중심으로 구성했습니다.</p>
      </section>

      <div class="ad-box">광고 영역</div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const nicknameTypes = {
      en: {
        title: "영어 닉네임",
        items: [
          "ShadowKnight", "MidnightWolf", "CrimsonBlade", "FrostEcho", "IronPhoenix",
          "DarkViper", "SolarFlare", "NeonRaven", "SilverFang", "MysticFrost",
          "Starlight", "Moonwalker", "Dreamweaver", "FutureEcho", "NovaRay",
          "Skyfall", "WildHeart", "SilentStorm", "BlueHorizon", "GoldenDawn",
          "ShadowX7", "DarkViper3", "CrimsonBlade9", "FrostEcho01", "IronPhoenix22",
          "NeonRaven07", "MysticFrost88", "Starlight99", "Moonwalker00", "BlueHorizon24"
        ]
      },
      kr: {
        title: "한글 닉네임",
        items: [
          "암흑의왕", "붉은검은별", "무적의검", "유일의존재", "불꽃의군주",
          "천둥의예언자", "심판의검은색", "회색도시", "빛의귀환자", "절망의파수꾼",
          "달달슈가", "뽀comfy냥냥", "레몬스파클", "뽀로리빵", "달콤톡톡",
          "푸른치즈", "토실토실파이", "슈가버터", "쿠키충전소", "부드러운우주",
          "빚과송금", "우리엄마", "쾌변춘향", "공익인간", "지젤반찬",
          "휴지필름", "벼락식혜", "올리브깡", "태조샷건", "눈이리신",
          "그라인드스타", "퀘스트마스터", "레벨업러", "수집광", "작업중독자",
          "임무왕", "번뜩이는노가다", "미션마니아", "스탬프헌터", "성장전문가",
          "빛스타", "다크이", "블루코", "네온ux", "에이스SB",
          "스파이qx", "질풍ax", "천둥Z", "브레드x", "블링xQ"
        ]
      },
      hanja: {
        title: "한문 닉네임",
        items: [
          "天王", "黑劍", "白虎", "青龍", "炎帝", "雷神", "風魂", "影王", "月皇", "龍將",
          "神劍", "暗主", "天魂", "黑霸", "白聖", "青尊", "炎王", "雷帝", "風神", "影龍",
          "天帝", "黑龍", "白王", "炎神", "雷魂", "月劍", "暗皇", "神主", "風霸", "影聖"
        ]
      },
      popular: {
        title: "인기 닉네임",
        items: [
          "유일한존재", "최종보스", "사라진검사", "광역의검", "빛의구원자",
          "흑막의주인", "최종장군", "지배의검", "숨은영웅", "운명의검",
          "Shadow야생마", "DarkViper인간", "Crimson바이크", "Frost코어", "Neon도시",
          "Iron슈퍼", "Mystic필름", "Lunar스타", "Blaze도면", "Silent검",
          "ShadowX7", "FrostEcho01", "NeonRaven07", "Starlight99", "최종보스"
        ]
      }
    };

    const STORAGE_KEY = "nicknameGeneratorHistory";
    const MAX_HISTORY = 7;

    let lastNicknames = loadHistory();
    let typingTimer = null;
    let toastTimer = null;
    let audioCtx = null;

    const typeSelect = document.getElementById("type");
    const nicknameEl = document.getElementById("nickname");
    const meaningEl = document.getElementById("meaning");
    const historyEl = document.getElementById("history");
    const toastEl = document.getElementById("toast");
    const generateBtn = document.getElementById("generateBtn");
    const copyBtn = document.getElementById("copyBtn");

    function randomFrom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function getSelectedTypeKey() {
      const selectedType = typeSelect.value;
      if (selectedType === "random") {
        return randomFrom(["en", "kr", "hanja", "popular"]);
      }
      return selectedType;
    }

    function createNickname() {
      const selectedType = typeSelect.value;
      const typeKey = getSelectedTypeKey();
      const data = nicknameTypes[typeKey];
      const result = randomFrom(data.items);
      const meaning = selectedType === "random"
        ? "랜덤으로 선택된 [" + data.title + "] 스타일 닉네임입니다."
        : "선택한 [" + data.title + "] 스타일 닉네임입니다.";

      return { result, meaning };
    }

    function typeEffect(text) {
      let i = 0;
      nicknameEl.innerText = "";

      if (typingTimer) {
        clearInterval(typingTimer);
      }

      typingTimer = setInterval(function () {
        nicknameEl.innerText += text.charAt(i);
        i++;

        if (i >= text.length) {
          clearInterval(typingTimer);
          typingTimer = null;
        }
      }, 42);
    }

    function generate() {
      playClickSound();

      let data = createNickname();
      let tryCount = 0;

      while (lastNicknames.includes(data.result) && tryCount < 15) {
        data = createNickname();
        tryCount++;
      }

      addHistory(data.result);
      typeEffect(data.result);
      meaningEl.innerText = data.meaning;
      updateHistory();
    }

    async function copyNick() {
      playClickSound();

      const text = nicknameEl.innerText.trim();

      if (!text) {
        showToast("먼저 닉네임을 생성하세요.");
        return;
      }

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          fallbackCopy(text);
        }
        showToast("복사됨: " + text);
      } catch (e) {
        fallbackCopy(text);
        showToast("복사됨: " + text);
      }
    }

    function fallbackCopy(text) {
      const temp = document.createElement("textarea");
      temp.value = text;
      temp.setAttribute("readonly", "");
      temp.style.position = "fixed";
      temp.style.left = "-9999px";
      document.body.appendChild(temp);
      temp.select();
      document.execCommand("copy");
      document.body.removeChild(temp);
    }

    function addHistory(nick) {
      lastNicknames = lastNicknames.filter(function (item) {
        return item !== nick;
      });
      lastNicknames.unshift(nick);
      lastNicknames = lastNicknames.slice(0, MAX_HISTORY);
      saveHistory();
    }

    function updateHistory() {
      historyEl.innerHTML = "";

      if (lastNicknames.length === 0) {
        historyEl.innerHTML = '<span class="history-item">생성 기록 없음</span>';
        return;
      }

      lastNicknames.forEach(function (nick) {
        const item = document.createElement("button");
        item.type = "button";
        item.className = "history-item";
        item.innerText = nick;
        item.onclick = function () {
          selectHistory(nick);
        };
        historyEl.appendChild(item);
      });
    }

    function selectHistory(nick) {
      playClickSound();

      if (typingTimer) {
        clearInterval(typingTimer);
        typingTimer = null;
      }

      nicknameEl.innerText = nick;
      meaningEl.innerText = "최근 생성 기록에서 다시 선택한 닉네임입니다.";
    }

    function showToast(message) {
      toastEl.innerText = message;
      toastEl.classList.add("show");

      if (toastTimer) {
        clearTimeout(toastTimer);
      }

      toastTimer = setTimeout(function () {
        toastEl.classList.remove("show");
      }, 1700);
    }

    function playClickSound() {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        const oscillator = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        oscillator.type = "triangle";
        oscillator.frequency.setValueAtTime(720, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(420, audioCtx.currentTime + 0.08);

        gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.09);

        oscillator.connect(gain);
        gain.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.09);
      } catch (e) {
        // 소리 재생이 차단되어도 생성기 기능은 정상 작동합니다.
      }
    }

    function loadHistory() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return [];
        const parsed = JSON.parse(saved);
        return Array.isArray(parsed) ? parsed.slice(0, MAX_HISTORY) : [];
      } catch (e) {
        return [];
      }
    }

    function saveHistory() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(lastNicknames));
      } catch (e) {
        // 저장 공간 제한이 있어도 생성기 기능은 정상 작동합니다.
      }
    }

    typeSelect.addEventListener("change", generate);
    generateBtn.addEventListener("click", generate);
    copyBtn.addEventListener("click", copyNick);

    document.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && document.activeElement !== typeSelect) {
        generate();
      }
    });

    updateHistory();
    generate();
  </script>
</body>
</html>
